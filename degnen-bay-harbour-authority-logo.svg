<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 430" role="img" aria-labelledby="title desc">
  <title id="title">Degnen Bay Harbour Authority Logo</title>
  <desc id="desc">A nautical logo with a lighthouse, waves, boat, birds, and the words Degnen Bay Harbour Authority.</desc>
  <defs>
    <style>
      .navy{fill:#062855}.blue{fill:#1772b8}.light{fill:#8fc7ee}.stroke{stroke:#062855;stroke-width:10;fill:none;stroke-linecap:round;stroke-linejoin:round}.thin{stroke:#1772b8;stroke-width:6;fill:none}.text-main{font-family: Georgia, 'Times New Roman', serif;font-weight:700;fill:#062855;letter-spacing:7px}.text-blue{font-family: Georgia, 'Times New Roman', serif;font-weight:700;fill:#2d86c8;letter-spacing:18px}.text-small{font-family: Arial, Helvetica, sans-serif;font-weight:700;fill:#062855;letter-spacing:22px}
    </style>
  </defs>

  <!-- Emblem -->
  <g transform="translate(35,35)">
    <path class="stroke" d="M35 315 A178 178 0 1 1 355 55"/>
    <path class="stroke" d="M355 55 A178 178 0 0 1 370 315" opacity=".9"/>

    <!-- distant islands -->
    <path class="light" d="M105 245 C145 215 175 225 210 205 C250 180 285 215 335 194 L365 236 L105 236 Z" opacity=".85"/>

    <!-- rocks -->
    <path class="navy" d="M25 265 L80 230 L135 220 L185 265 Z"/>
    <path fill="#0d386f" d="M95 265 L155 213 L205 265 Z"/>
    <path fill="#fff" d="M58 254 L137 223 L113 238 L28 274 Z" opacity=".95"/>

    <!-- lighthouse -->
    <g class="navy">
      <path d="M142 91 L188 55 L232 91 Z"/>
      <rect x="157" y="91" width="60" height="45"/>
      <rect x="151" y="135" width="75" height="24"/>
      <rect x="168" y="159" width="42" height="116"/>
      <path d="M158 275 L220 275 L235 330 L145 330 Z"/>
      <rect x="147" y="124" width="83" height="9"/>
      <rect x="153" y="132" width="7" height="30"/><rect x="170" y="132" width="7" height="30"/><rect x="187" y="132" width="7" height="30"/><rect x="204" y="132" width="7" height="30"/><rect x="221" y="132" width="7" height="30"/>
    </g>
    <rect x="172" y="96" width="12" height="36" fill="#fff"/><rect x="194" y="96" width="12" height="36" fill="#fff"/>
    <path d="M186 204 C176 204 171 211 171 221 L171 252 L201 252 L201 221 C201 211 196 204 186 204 Z" fill="#fff"/>

    <!-- boat -->
    <g transform="translate(270,200)">
      <path class="navy" d="M15 48 L113 48 L102 78 L34 83 Z"/>
      <rect class="navy" x="40" y="18" width="52" height="34"/>
      <rect x="48" y="25" width="16" height="16" fill="#fff"/><rect x="70" y="25" width="14" height="16" fill="#fff"/>
      <rect class="navy" x="64" y="-20" width="6" height="38"/>
      <rect class="navy" x="86" y="-4" width="5" height="20"/>
    </g>

    <!-- birds -->
    <path class="stroke" stroke-width="6" d="M255 105 C275 88 297 88 320 105 C338 92 358 93 375 107"/>
    <path class="stroke" stroke-width="5" d="M238 150 C252 139 266 139 280 150 C293 141 306 142 318 152"/>

    <!-- waves -->
    <path class="blue" d="M30 310 C95 280 140 295 205 320 C265 345 318 335 383 292 C365 360 293 390 207 367 C145 350 94 323 30 350 Z"/>
    <path fill="#fff" d="M35 323 C105 302 147 317 210 340 C276 365 326 346 379 313 C322 372 259 388 202 368 C131 343 90 326 35 346 Z"/>
    <path class="light" d="M42 352 C108 330 159 348 222 368 C270 383 319 376 353 348 C300 405 195 407 42 374 Z"/>
  </g>

  <!-- Text lockup -->
  <g transform="translate(520,95)">
    <text class="text-main" x="0" y="75" font-size="86">DEGNEN BAY</text>
    <line class="thin" x1="0" y1="108" x2="820" y2="108"/>
    <text class="text-blue" x="0" y="222" font-size="84">HARBOUR</text>
    <line class="thin" x1="0" y1="285" x2="150" y2="285"/>
    <text class="text-small" x="185" y="302" font-size="48">AUTHORITY</text>
    <line class="thin" x1="690" y1="285" x2="820" y2="285"/>
  </g>
</svg>
